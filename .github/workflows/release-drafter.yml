name: Release Drafter

# Automatically drafts release notes as PRs are merged.
# Uses release-drafter/release-drafter@v7 (v7.1.1, verified creator).
# Config: .github/release-drafter.yml

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
