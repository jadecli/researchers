# neon-cleanup.yml — Delete Neon preview branch when PR closes
#
# Prevents branch sprawl and unnecessary compute charges.
# Uses official neondatabase/delete-branch-action.

name: Neon Cleanup

on:
  pull_request:
    types: [closed]

env:
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}

jobs:
  delete-branch:
    name: Delete Neon Preview Branch
    runs-on: ubuntu-latest

    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ env.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.pull_request.number }}
          api_key: ${{ env.NEON_API_KEY }}

      - name: Confirm deletion
        run: echo "Deleted Neon branch preview/pr-${{ github.event.pull_request.number }}"
