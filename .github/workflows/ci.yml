name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TypeScript: .jade/ data models ─────────────────────────────────────
  jade-typecheck:
    name: ".jade/ typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .jade
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit

  # ─── TypeScript: dispatch tests ─────────────────────────────────────────
  dispatch-tests:
    name: "dispatch tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-multi-agent-dispatch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx vitest run

  # ─── TypeScript: SDK tests ─────────────────────────────────────────────
  sdk-tests:
    name: "SDK tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-multi-agent-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npx vitest run
        continue-on-error: true  # pre-existing failures from missing @anthropic-ai/sdk runtime

  # ─── TypeScript: .jade/ automation tests ────────────────────────────────
  jade-tests:
    name: ".jade/ automation tests"
    runs-on: ubuntu-latest
    needs: [jade-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install .jade/ dependencies
        working-directory: .jade
        run: npm install
      - name: Install dispatch dependencies
        working-directory: claude-multi-agent-dispatch
        run: npm ci --legacy-peer-deps
      - name: Install SDK dependencies
        working-directory: claude-multi-agent-sdk
        run: npm ci --legacy-peer-deps
      - name: Run .jade/ hook tests
        working-directory: claude-multi-agent-dispatch
        run: npx vitest run --config ../vitest.jade.config.ts

  # ─── Python: lint + type check ──────────────────────────────────────────
  python-lint:
    name: "Python lint & typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy rbloom
      - run: ruff check scrapy_researchers/
      - run: ruff format --check scrapy_researchers/
      - run: mypy scrapy_researchers/bloom_filter.py --ignore-missing-imports

  # ─── Python: tests ─────────────────────────────────────────────────────
  python-tests:
    name: "Python tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: claude-code
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]" rbloom
      - run: python -m pytest tests/ -v
        continue-on-error: true  # tests may need scrapy runtime

  # ─── Shell: hook validation ─────────────────────────────────────────────
  hooks:
    name: "Hook scripts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd .jade && npm install
          cd ../claude-multi-agent-dispatch && npm ci --legacy-peer-deps
          cd ../claude-multi-agent-sdk && npm ci --legacy-peer-deps
      - name: session-start hook
        run: bash .jade/hooks/session-start.sh
      - name: pre-commit hook
        run: bash .jade/hooks/pre-commit.sh

  # ─── SQL: migration syntax check ───────────────────────────────────────
  sql-check:
    name: "SQL migration syntax"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SQL files are non-empty and parseable
        run: |
          errors=0
          for f in .jade/warehouse/migrations/*.sql; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty"
              errors=$((errors + 1))
            fi
            # Check for unclosed statements (basic syntax check)
            if grep -cP '^\s*CREATE\s+(TABLE|TYPE|INDEX|EXTENSION|VIEW)' "$f" > /dev/null 2>&1; then
              echo "OK: $f has valid DDL statements"
            else
              echo "WARN: $f may not contain DDL"
            fi
          done
          if [ $errors -gt 0 ]; then exit 1; fi
