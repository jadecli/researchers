name: Claude Code Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run when the secret is configured
    if: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code security scan
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Perform a security review of this PR. Focus on:
            1. Hardcoded secrets, API keys, or credentials
            2. SQL injection, XSS, command injection vulnerabilities
            3. Insecure use of eval(), exec(), or dynamic code execution
            4. Sensitive data in logs or error messages
            5. Missing input validation at system boundaries
            6. Insecure file operations (path traversal, symlink attacks)

            Exclude: node_modules, vendor, .git, dist, __pycache__

            Post findings as a PR review. Do NOT approve — only flag issues.

  channel-alert:
    runs-on: ubuntu-latest
    needs: security-review
    if: failure()
    steps:
      - name: Alert via channel webhook
        env:
          CHANNEL_WEBHOOK_URL: ${{ secrets.CHANNEL_WEBHOOK_URL }}
        run: |
          if [ -n "$CHANNEL_WEBHOOK_URL" ]; then
            curl -s -X POST "$CHANNEL_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\": \"Security review flagged issues on PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}\"}" || true
          fi
