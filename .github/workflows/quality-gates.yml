name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: |
            agenttasks/package-lock.json
            claude-multi-agent-sdk/package-lock.json
            claude-multi-agent-dispatch/package-lock.json
            agentcrawls-ts/package-lock.json

      - uses: astral-sh/setup-uv@v4

      - name: Setup
        run: make setup

      - name: Install agenttasks dependencies
        run: cd agenttasks && npm ci

      - name: Fetch base branch for diff
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=1

      - name: Quality gates (pre-commit on changed files)
        if: github.event_name == 'pull_request'
        run: pre-commit run --from-ref origin/${{ github.base_ref }} --to-ref HEAD

      - name: Quality gates (pre-commit on all files)
        if: github.event_name == 'push'
        run: pre-commit run --all-files
