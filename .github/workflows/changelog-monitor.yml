name: Changelog Monitor

# Automated upstream changelog monitoring.
# Runs on a daily schedule + manual dispatch.
#
# 1. Checks if CHANGELOG.md has changed in:
#    - anthropics/claude-code
#    - anthropics/claude-code-sdk-python (claude-agents-sdk-python)
#    - anthropics/claude-code-sdk-node  (claude-agents-sdk-typescript)
# 2. Runs the agentcrawls-ts crawler to detect new sections via bloom filter
# 3. If new bullets found, creates a GitHub issue with migration checklist
# 4. Optionally persists to Neon PG18 if DATABASE_URL is available
#
# The bloom filter state is stored as a workflow artifact between runs
# to maintain detection state across CI invocations.

on:
  schedule:
    # Run daily at 06:00 UTC (before workday starts)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_crawl:
        description: 'Force full crawl (ignore bloom filter)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'agentcrawls-ts/package-lock.json'

      - name: Install agentcrawls-ts dependencies
        run: cd agentcrawls-ts && npm ci --legacy-peer-deps

      # Restore bloom filter state from previous run
      - name: Restore bloom filter cache
        uses: actions/cache@v5
        with:
          path: ~/.agentcrawls/changelog-bloom.json
          key: changelog-bloom-${{ github.run_number }}
          restore-keys: |
            changelog-bloom-

      # Check upstream changelogs for changes via HTTP HEAD
      - name: Check upstream changelog freshness
        id: check
        run: |
          CHANGED=false

          for url in \
            "https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md" \
            "https://raw.githubusercontent.com/anthropics/claude-code-sdk-python/main/CHANGELOG.md" \
            "https://raw.githubusercontent.com/anthropics/claude-code-sdk-node/main/CHANGELOG.md"; do

            # Get current ETag/Last-Modified
            HEADERS=$(curl -sI "$url" 2>/dev/null | head -20)
            ETAG=$(echo "$HEADERS" | grep -i "^etag:" | tr -d '\r' || true)
            echo "  $url -> ${ETAG:-no-etag}"
          done

          # Always run the crawler — the bloom filter handles dedup
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Run the crawler
      - name: Run changelog crawler
        id: crawl
        if: steps.check.outputs.changed == 'true' || github.event.inputs.force_crawl == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRAWL_DATA_DIR: ${{ runner.temp }}/agentcrawls
        run: |
          # Copy bloom filter from cache to crawl data dir
          mkdir -p "$CRAWL_DATA_DIR"
          if [ -f ~/.agentcrawls/changelog-bloom.json ]; then
            cp ~/.agentcrawls/changelog-bloom.json "$CRAWL_DATA_DIR/"
          fi

          cd agentcrawls-ts
          OUTPUT=$(npx tsx src/index.ts 2>&1) || true
          echo "$OUTPUT"

          # Parse output for new bullet count
          NEW_BULLETS=$(echo "$OUTPUT" | grep -oP 'Extracted \K[0-9]+' || echo "0")
          echo "new_bullets=$NEW_BULLETS" >> "$GITHUB_OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Copy bloom filter back for caching
          if [ -f "$CRAWL_DATA_DIR/changelog-bloom.json" ]; then
            mkdir -p ~/.agentcrawls
            cp "$CRAWL_DATA_DIR/changelog-bloom.json" ~/.agentcrawls/
          fi

      # Create GitHub issue if new changes detected
      - name: Create issue for new changelog entries
        if: steps.crawl.outputs.new_bullets != '0' && steps.crawl.outputs.new_bullets != ''
        uses: actions/github-script@v9
        with:
          script: |
            const newBullets = '${{ steps.crawl.outputs.new_bullets }}';
            const crawlOutput = `${{ steps.crawl.outputs.output }}`.substring(0, 3000);
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore: upstream changelog updates detected (${today})`,
              labels: ['changelog', 'chore'],
              body: [
                '## Upstream Changelog Changes Detected',
                '',
                `**${newBullets} new bullet(s)** found across monitored repos:`,
                '- `anthropics/claude-code`',
                '- `anthropics/claude-code-sdk-python`',
                '- `anthropics/claude-code-sdk-node`',
                '',
                '### Migration Checklist',
                '',
                '- [ ] Review new changelog entries below',
                '- [ ] Check for breaking changes in `@anthropic-ai/sdk` or `@anthropic-ai/claude-agent-sdk`',
                '- [ ] Update pinned package versions if needed (see `package.json` in each sub-repo)',
                '- [ ] Run `npm run test:all` to verify compatibility',
                '- [ ] Update research notes if API patterns changed',
                '',
                '### Crawler Output',
                '',
                '```',
                crawlOutput,
                '```',
                '',
                '---',
                `Generated by [Changelog Monitor](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`,
              ].join('\n'),
            });
