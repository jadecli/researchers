name: PR Spider Review

on:
  pull_request:
    paths:
      - "spiders/**"
      - "chrome/**"
      - "scripts/run-crawl.sh"

permissions:
  contents: read
  pull-requests: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint spider changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- '*.py')
          if [ -n "${CHANGED}" ]; then
            ruff check --diff ${CHANGED} || true
          fi

      - name: Review with Claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review the spider changes in this pull request.

            Run: git diff origin/main...HEAD -- spiders/ chrome/ scripts/run-crawl.sh

            Check for:
            1. Correctness: Are CSS selectors / XPath expressions valid?
            2. Robustness: Does the spider handle missing elements, timeouts, HTTP errors?
            3. Performance: Are there unnecessary requests or redundant parsing steps?
            4. Data quality: Will extracted data pass the quality gate (completeness >= 0.85)?
            5. Security: No hardcoded credentials, no unsafe eval/exec on crawled data
            6. Style: Follows project ruff/mypy conventions

            Post a review comment summarizing findings and suggestions.
          max_turns: 10

      - name: Run smoke test
        run: |
          python scripts/check-quality.py --threshold 0.70 --dry-run || true
