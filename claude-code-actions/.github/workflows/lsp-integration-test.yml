name: LSP Integration Test

on:
  push:
    branches: [main]
    paths:
      - "lsp_setup/**"
  pull_request:
    paths:
      - "lsp_setup/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e "."

      - name: Validate all LSP JSON configs
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for path in sorted(glob.glob('lsp_setup/lsp_configs/*.json')):
              try:
                  with open(path) as f:
                      config = json.load(f)
                  required = ['name', 'command', 'filetypes']
                  missing = [k for k in required if k not in config]
                  if missing:
                      errors.append(f'{path}: missing keys {missing}')
              except json.JSONDecodeError as e:
                  errors.append(f'{path}: invalid JSON: {e}')
          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          print(f'Validated {len(glob.glob(\"lsp_setup/lsp_configs/*.json\"))} LSP configs OK')
          "

  install-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pip install -e "."

      - name: Install all LSP servers
        run: bash lsp_setup/install_all_lsp.sh

      - name: Verify LSP installations
        run: python lsp_setup/verify_lsp.py --strict

      - name: Smoke-test LSP startup
        run: |
          python -c "
          import json, subprocess, glob, time

          results = {}
          for path in sorted(glob.glob('lsp_setup/lsp_configs/*.json')):
              with open(path) as f:
                  config = json.load(f)
              name = config['name']
              cmd = config['command']
              try:
                  proc = subprocess.Popen(
                      cmd, shell=True,
                      stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE
                  )
                  time.sleep(2)
                  proc.terminate()
                  proc.wait(timeout=5)
                  results[name] = 'ok'
              except FileNotFoundError:
                  results[name] = 'not_found'
              except Exception as e:
                  results[name] = f'error: {e}'

          for name, status in results.items():
              icon = 'PASS' if status == 'ok' else 'FAIL'
              print(f'  [{icon}] {name}: {status}')

          failures = {k: v for k, v in results.items() if v != 'ok'}
          if failures:
              print(f'::warning::{len(failures)} LSP servers failed smoke test')
          "
