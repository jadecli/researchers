# Security policies for crawling and spider operations
policies:
  network:
    max_redirects: 5
    allowed_schemes:
      - http
      - https
    max_response_size: 10485760  # 10MB
    connection_timeout: 30
    read_timeout: 60
    dns_cache_ttl: 300

  headers:
    required_headers:
      - User-Agent
    disallowed_headers_in_crawlers:
      - Authorization
      - Cookie
      - X-Api-Key
      - X-Auth-Token
    default_user_agent: "SecurityReviewBot/1.0"

  rate_limiting:
    max_requests_per_second: 10
    max_concurrent_requests: 5
    autothrottle_enabled: true

  data_handling:
    max_item_size: 1048576  # 1MB
    allowed_output_dirs:
      - data/
      - output/
      - results/
    disallowed_file_extensions:
      - .exe
      - .dll
      - .so
      - .sh
      - .bat
      - .cmd

  tls:
    verify_ssl: true
    minimum_tls_version: "1.2"
